<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>邱茂鋒Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background-color: #000; color: #0f0; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }
    
    .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; border-bottom: 2px solid #0f0; }

    /* Visualizer Style */
    .gauge-container { display: flex; justify-content: center; margin: 10px 0; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; height: 120px; }
    canvas { width: 100%; height: 100%; }

    .scroll-title { text-align: center; color: #0f0; margin: 0 0 10px 0; font-size: 1.6em; text-transform: uppercase; letter-spacing: 2px; }
    .current-song-wrapper { background: #111; padding: 12px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #0ff; }
    .current-song-text { display: block; text-align: center; color: #0ff; font-weight: bold; font-family: monospace; }
    
    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .controls-bar button { background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 4px; padding: 10px 16px; cursor: pointer; font-weight: bold; }
    .controls-bar button:hover { background: #0f0; color: #000; }
    
    .audio-enhancements { display: flex; flex-wrap: wrap; gap: 20px; border: 1px solid #0f0; padding: 15px; border-radius: 4px; justify-content: center; background: #050505; }
    .slider-group { display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
    input[type=range] { accent-color: #0f0; cursor: pointer; }

    /* Business Times RSS Ticker */
    .rss-ticker {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #111; color: #ff0; 
      white-space: nowrap; overflow: hidden; padding: 12px 0; border-top: 2px solid #333; z-index: 1000;
      font-family: 'Courier New', Courier, monospace; font-size: 1.1em;
    }
    .ticker-content { display: inline-block; animation: scroll-ticker 120s linear infinite; }
    @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    ol { padding-left: 30px; color: #0f0; margin-top: 20px; }
    li { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; transition: 0.3s; }
    .song-title { font-size: 1.1em; display: block; margin-bottom: 10px; }
    audio { width: 100%; height: 40px; }
    li.playing { border: 2px solid #fff; border-radius: 8px; padding: 15px; background: rgba(0,255,255,0.1); box-shadow: 0 0 15px rgba(0,255,255,0.3); }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <h2 class="scroll-title">Stephen Khoo 邱茂鋒 Playlist</h2>
      
      <div class="gauge-container">
        <canvas id="visualizer"></canvas>
      </div>

      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">BT NEWS SYNCING // SELECT TRACK</span>
      </div>

      <div class="controls-bar">
        <button id="playBtn">PLAY</button>
        <button id="stopBtn">STOP</button>
        <button id="prevBtn">PREV</button>
        <button id="nextBtn">NEXT</button>
        <button id="modeBtn">MODE: SHUFFLE</button>
      </div>

      <div class="audio-enhancements">
        <div class="slider-group"><label>VOL</label> <input id="masterVolume" type="range" min="0" max="1" step="0.05" value="1"></div>
        <div class="slider-group"><label>BASS</label> <input id="bassEq" type="range" min="-12" max="12" step="1" value="0"></div>
        <div class="slider-group"><label>TREBLE</label> <input id="trebleEq" type="range" min="-12" max="12" step="1" value="0"></div>
      </div>
    </div>

    <ol id="playlist"><li>Initialising Business Terminal...</li></ol>
  </div>

  <div class="rss-ticker" id="rssTicker">
    <div class="ticker-content" id="tickerContent">Fetching live Business Times feeds...</div>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';
    
    // Business Times RSS Feed List
    const RSS_FEEDS = [
      'https://www.businesstimes.com.sg/rss/singapore',
      'https://www.businesstimes.com.sg/rss/economy-policy',
      'https://www.businesstimes.com.sg/rss/companies-markets',
      'https://www.businesstimes.com.sg/rss/banking-finance',
      'https://www.businesstimes.com.sg/rss/telcos-media-tech',
      'https://www.businesstimes.com.sg/rss/capital-markets-currencies',
      'https://www.businesstimes.com.sg/rss/wealth',
      'https://www.businesstimes.com.sg/rss/working-life'
    ];
    
    const PROXY = 'https://api.allorigins.win/raw?url=';

    let tracks = [], items = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'shuffle', audioCtx, bassNode, trebleNode, analyser, dataArray;

    async function init() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        const playlist = document.getElementById('playlist');
        playlist.innerHTML = '';
        
        files.filter(f => f.name.endsWith('.mp3')).forEach((file) => {
          const cleanName = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ');
          const li = document.createElement('li');
          li.innerHTML = `
            <span class="song-title">${cleanName}</span>
            <audio controls class="track" crossorigin="anonymous">
              <source src="${file.download_url}" type="audio/mpeg">
            </audio>
          `;
          playlist.appendChild(li);
        });
        
        setupPlayer();
        loadRSS();
      } catch (e) { 
        document.getElementById('playlist').innerHTML = "<li>Terminal Connection Error.</li>";
      }
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      tracks.forEach((t, i) => {
        t.addEventListener('play', () => { if (currentlyPlaying !== i) playTrack(i); });
        t.addEventListener('ended', goToNext);
      });
      buildQueue(0);
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      const audio = tracks[idx];
      
      initAudioContext(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      document.getElementById('currentSongDisplay').textContent = "NOW PLAYING: " + items[idx].querySelector('.song-title').textContent.toUpperCase();
      audio.play();
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        startVisualizer();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); 
        trebleNode.connect(analyser); 
        analyser.connect(audioCtx.destination);
      }

      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode);
        audio.hasConnected = true;
      }
    }

    function startVisualizer() {
      const canvas = document.getElementById('visualizer');
      const ctx = canvas.getContext('2d');
      function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barWidth = (canvas.width / dataArray.length) * 2.5;
        let x = 0;
        for(let i = 0; i < dataArray.length; i++) {
          let barHeight = dataArray[i] / 2;
          ctx.fillStyle = `rgb(0, 255, ${barHeight + 50})`;
          ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
          x += barWidth + 2;
        }
      }
      draw();
    }

    async function loadRSS() {
      let allHeadlines = [];
      for (let url of RSS_FEEDS) {
        try {
          const res = await fetch(PROXY + encodeURIComponent(url));
          const text = await res.text();
          const xml = new DOMParser().parseFromString(text, "text/xml");
          const newsItems = Array.from(xml.querySelectorAll("item")).slice(0, 5);
          newsItems.forEach(item => {
            allHeadlines.push(item.querySelector("title").textContent.toUpperCase());
          });
        } catch (e) { console.warn("Failed: " + url); }
      }
      if(allHeadlines.length > 0) {
        document.getElementById('tickerContent').textContent = " +++ BUSINESS TIMES SINGAPORE +++ " + allHeadlines.join("  ///  ");
      }
    }

    function goToNext() { queuePos = (queuePos + 1) % queue.length; playTrack(queue[queuePos]); }
    function buildQueue(start) { 
      queue = tracks.map((_, i) => i); 
      if (playMode === 'shuffle') queue.sort(() => Math.random() - 0.5); 
      queuePos = queue.indexOf(start); 
    }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; }};
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { queuePos = (queuePos - 1 + queue.length) % queue.length; playTrack(queue[queuePos]); };
    document.getElementById('modeBtn').onclick = function() { 
      playMode = playMode === 'shuffle' ? 'normal' : 'shuffle'; 
      this.textContent = "MODE: " + playMode.toUpperCase(); 
      buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0); 
    };
    
    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
