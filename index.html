<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>邱茂鋒Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #000000; color: #00ff00; }
    .container { max-width: 900px; margin: 0 auto; position: relative; }
    
    .sticky-header { 
      position: -webkit-sticky; 
      position: sticky; 
      top: 0; 
      z-index: 100; 
      background-color: #000000; 
      padding: 10px 4px; 
      border-bottom: 1px solid #333; 
    }

    .scroll-title { text-align: center; color: #00ff00; margin: 0 0 10px 0; font-size: 1.5em; }
    
    .current-song-wrapper { 
      background: #111; 
      padding: 10px; 
      border-radius: 4px; 
      margin-bottom: 15px; 
      border: 1px solid #333;
    }
    .current-song-text { display: block; text-align: center; color: #00ffff; font-weight: bold; }
    
    .controls-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
    .controls-group { display: flex; gap: 5px; }
    .controls-bar button { 
      background-color: #222; 
      color: #00ff00; 
      border: 1px solid #00ff00; 
      border-radius: 4px; 
      padding: 8px 15px; 
      cursor: pointer; 
    }
    .controls-bar button:hover { background-color: #00ff00; color: #000; }
    
    .audio-enhancements { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 15px; 
      border: 1px solid #00ff00; 
      padding: 15px; 
      border-radius: 4px; 
      margin: 10px 0; 
      justify-content: center; 
    }
    .slider-group { display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: #00ff00; cursor: pointer; }

    .search-wrapper { margin: 15px 0; }
    .search-input { 
      width: 100%; 
      box-sizing: border-box; 
      background: #111; 
      border: 1px solid #00ff00; 
      color: #00ff00; 
      padding: 12px; 
      border-radius: 4px; 
    }
    
    ol { padding-left: 25px; color: #00ff00; }
    li { 
      margin-bottom: 25px; 
      border-bottom: 1px solid #222; 
      padding-bottom: 15px; 
    }
    .song-title { font-size: 1.1em; display: block; margin-bottom: 8px; color: #00ff00; }
    audio { width: 100%; height: 35px; }
    
    ol li.playing { 
      border: 2px solid #ffffff; 
      border-radius: 8px; 
      padding: 15px; 
      background-color: rgba(0, 255, 255, 0.05); 
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <h2 class="scroll-title">Stephen Khoo 邱茂鋒 Playlist</h2>
      
      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">Now Playing: (waiting for selection)</span>
      </div>

      <div class="controls-bar">
        <div class="controls-group">
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
          <button id="prevBtn">Prev</button>
          <button id="nextBtn">Next</button>
        </div>
        <button id="modeBtn">Mode: Shuffle</button>
      </div>

      <div class="audio-enhancements">
        <div class="slider-group"><label>Vol</label> <input id="masterVolume" type="range" min="0" max="1" step="0.05" value="1"></div>
        <div class="slider-group"><label>Bass</label> <input id="bassEq" type="range" min="-12" max="12" step="1" value="0"></div>
        <div class="slider-group"><label>Treble</label> <input id="trebleEq" type="range" min="-12" max="12" step="1" value="0"></div>
      </div>

      <div class="search-wrapper">
        <input type="text" id="songSearch" class="search-input" placeholder="Search playlist...">
      </div>
    </div>

    <ol id="playlist">
      <li>Fetching your music from GitHub...</li>
    </ol>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';

    let items = [], tracks = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'shuffle', audioCtx, bassNode, trebleNode;

    async function init() {
      const playlistElement = document.getElementById('playlist');
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        if (!response.ok) throw new Error("Folder not found");
        const files = await response.json();
        
        playlistElement.innerHTML = '';
        files.filter(f => f.name.endsWith('.mp3')).forEach((file) => {
          const cleanName = decodeURIComponent(file.name).replace('.mp3', '').replace(/-/g, ' ').replace(/_/g, ' ');
          const li = document.createElement('li');
          // Removed manual numbering to fix double numbering bug[cite: 3]
          li.innerHTML = `
            <span class="song-title">${cleanName}</span>
            <audio controls class="track"><source src="${file.download_url}" type="audio/mpeg"></audio>
          `;
          playlistElement.appendChild(li);
        });

        setupPlayer();
      } catch (e) {
        playlistElement.innerHTML = "<li>Error loading playlist. Verify 'mp3' folder on GitHub.</li>";
      }
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      
      tracks.forEach((t, i) => {
        t.addEventListener('play', () => { if (currentlyPlaying !== i) playTrack(i); });
        t.addEventListener('ended', goToNext);
      });
      
      buildQueue(0);
      document.getElementById('currentSongDisplay').textContent = "Ready to Play (" + tracks.length + " songs)";
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      
      currentlyPlaying = idx;
      const audio = tracks[idx];
      
      // Critical Fix: Initialize and Resume context on user click[cite: 3]
      initAudioContext(audio);
      
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      document.getElementById('currentSongDisplay').textContent = "Now Playing: " + items[idx].querySelector('.song-title').textContent;
      
      // Play with catch for autoplay blocks[cite: 3]
      audio.play().catch(e => console.error("Playback failed:", e));
    }

    function goToNext() {
      queuePos = (queuePos + 1) % queue.length;
      playTrack(queue[queuePos]);
    }

    function buildQueue(startIndex) {
      queue = tracks.map((_, i) => i);
      if (playMode === 'shuffle') {
        queue.sort(() => Math.random() - 0.5);
      }
      queuePos = queue.indexOf(startIndex);
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      
      // Resume context if browser suspended it[cite: 3]
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(audioCtx.destination);
      }

      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode);
        audio.hasConnected = true;
      }
    }

    document.getElementById('playBtn').onclick = () => {
      if(currentlyPlaying === -1) playTrack(queue[0]);
      else tracks[currentlyPlaying].play();
    };

    document.getElementById('stopBtn').onclick = () => {
      if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; }
    };

    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => {
      queuePos = (queuePos - 1 + queue.length) % queue.length;
      playTrack(queue[queuePos]);
    };

    document.getElementById('modeBtn').onclick = function() {
      playMode = playMode === 'shuffle' ? 'normal' : 'shuffle';
      this.textContent = "Mode: " + (playMode.charAt(0).toUpperCase() + playMode.slice(1));
      buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0);
    };

    document.getElementById('songSearch').oninput = (e) => {
      const val = e.target.value.toLowerCase();
      items.forEach(li => li.style.display = li.textContent.toLowerCase().includes(val) ? '' : 'none');
    };

    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
