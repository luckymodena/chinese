<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>邱茂鋒Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #000000; color: #00ff00; }
    .container { max-width: 900px; margin: 0 auto; position: relative; }
    .sticky-header { position: -webkit-sticky; position: sticky; top: 0; z-index: 100; background-color: #000000; padding: 6px 4px; border-bottom: 1px solid #333; }
    .scroll-wrapper { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 4px; }
    .scroll-title { display: block; font-size: 1.5em; font-weight: bold; text-align: center; margin: 0 auto; }
    
    .current-song-wrapper { width: 100%; overflow: hidden; white-space: nowrap; font-size: 1em; margin-bottom: 4px; position: relative; height: 25px; }
    .current-song-text { display: inline-block; position: absolute; white-space: nowrap; animation: scrollCurrent 30s linear infinite; }
    #currentSongScrolling { color: #00ffff; }
    #newsTicker { color: #ffcc00; animation-duration: 120s; } /* Longer duration for more headlines */
    
    @keyframes scrollCurrent { 
      0% { transform: translateX(100%); } 
      100% { transform: translateX(-100%); } 
    }

    .vu-meter-container { display: flex; justify-content: center; margin: 6px 0; background-color: #000; overflow-x: auto; }
    #vuMeter { background-color: #111; border: 1px solid #333; border-radius: 8px; max-width: 100%; }

    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .controls-group { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    audio { width: 100%; margin-top: 4px; accent-color: #00ff00; }
    .controls-bar button { background-color: #333; color: #00ff00; border: 1px solid #00ff00; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
    
    .search-input { width: 100%; box-sizing: border-box; background: #111; border: 1px solid #00ff00; color: #00ff00; padding: 8px 12px; border-radius: 4px; }
    ol { padding-left: 45px; margin: 0; }
    li { margin-bottom: 12px; }
    ol li.playing { border: 2px solid #ffffff; border-radius: 6px; padding: 4px 6px; background-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px #ffffff; animation: blinkPlaying 2s linear infinite; }
    @keyframes blinkPlaying { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <div class="scroll-wrapper"><h2 class="scroll-title">Stephen Khoo 邱茂鋒 Playlist</h2></div>
      <div class="current-song-wrapper"><span id="currentSongScrolling" class="current-song-text">Now Playing: (loading songs...)</span></div>
      <div class="current-song-wrapper"><span id="newsTicker" class="current-song-text">Latest News: Initializing Business Times feeds...</span></div>
      
      <div class="vu-meter-container">
        <canvas id="vuMeter" width="600" height="180"></canvas>
      </div>

      <div class="controls-bar">
        <div class="controls-group">
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
          <button id="prevBtn">Prev</button>
          <button id="nextBtn">Next</button>
        </div>
        <input type="text" id="songSearch" class="search-input" placeholder="Search playlist..." style="flex: 1; min-width: 150px;">
      </div>
    </div>

    <ol id="playlist"><li>Loading songs from GitHub...</li></ol>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';

    // Updated Business Times RSS Feeds
    const RSS_FEEDS = [
      'https://www.businesstimes.com.sg/rss/singapore',
      'https://www.businesstimes.com.sg/rss/economy-policy',
      'https://www.businesstimes.com.sg/rss/companies-markets',
      'https://www.businesstimes.com.sg/rss/banking-finance',
      'https://www.businesstimes.com.sg/rss/telcos-media-tech',
      'https://www.businesstimes.com.sg/rss/capital-markets-currencies',
      'https://www.businesstimes.com.sg/rss/wealth',
      'https://www.businesstimes.com.sg/rss/working-life'
    ];

    let items = [], tracks = [], currentlyPlaying = -1;
    let audioCtx, analyzer, pcmData, leftValue = 0, animationFrameId;

    async function fetchRSS() {
      const ticker = document.getElementById('newsTicker');
      let allHeadlines = [];

      // Fetch from all feeds in parallel
      const fetchPromises = RSS_FEEDS.map(url => 
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`)
          .then(res => res.json())
          .catch(err => null)
      );

      const results = await Promise.all(fetchPromises);
      
      results.forEach(data => {
        if (data && data.status === 'ok') {
          const titles = data.items.map(item => item.title);
          allHeadlines = allHeadlines.concat(titles);
        }
      });
      
      if (allHeadlines.length > 0) {
        // Shuffle or slice headlines if the string gets too long for performance
        ticker.textContent = "Latest News: " + allHeadlines.join(' | ');
      }
    }

    async function loadPlaylistFromGitHub() {
        const playlistElement = document.getElementById('playlist');
        const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`;
        try {
            const response = await fetch(apiUrl);
            const files = await response.json();
            playlistElement.innerHTML = '';
            files.filter(f => f.name.endsWith('.mp3')).forEach((file) => {
                const songName = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ');
                const li = document.createElement('li');
                li.innerHTML = `<span class="song-title">${songName}</span><audio controls class="track"><source src="${file.download_url}" type="audio/mpeg"></audio>`;
                playlistElement.appendChild(li);
            });
            refreshTrackArrays();
        } catch (e) { playlistElement.innerHTML = "<li>Error loading songs.</li>"; }
    }

    function refreshTrackArrays() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      tracks.forEach((audio, idx) => {
        audio.addEventListener('play', () => playTrack(idx));
        audio.addEventListener('ended', () => playTrack((idx + 1) % tracks.length));
      });
    }

    function playTrack(idx) {
      tracks.forEach((a, i) => { a.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      if (!audioCtx) setupAudioContext();
      items[idx].classList.add('playing');
      document.getElementById('currentSongScrolling').textContent = 'Now Playing: ' + items[idx].querySelector('.song-title').textContent;
      tracks[idx].play();
    }

    function setupAudioContext() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyzer = audioCtx.createAnalyser();
      analyzer.fftSize = 256;
      pcmData = new Float32Array(analyzer.fftSize);
      
      tracks.forEach(t => {
        if (!t.hasConnected) {
          const source = audioCtx.createMediaElementSource(t);
          source.connect(analyzer); analyzer.connect(audioCtx.destination);
          t.hasConnected = true;
        }
      });
      drawGauges();
    }

    function drawGauges() {
      animationFrameId = requestAnimationFrame(drawGauges);
      const canvas = document.getElementById('vuMeter');
      const ctx = canvas.getContext('2d');
      const now = new Date();

      if (analyzer && currentlyPlaying !== -1 && !tracks[currentlyPlaying].paused) {
        analyzer.getFloatTimeDomainData(pcmData);
        let sum = 0; pcmData.forEach(v => sum += v*v);
        let peak = Math.sqrt(sum / pcmData.length) * 2.5;
        leftValue = leftValue * 0.85 + (peak > 1 ? 1 : peak) * 0.15;
      } else { leftValue *= 0.85; }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawCircleGauge(ctx, 100, 90, 70, leftValue, "MUSIC", "#00ff00");
      drawCircleGauge(ctx, 300, 90, 70, now.getSeconds()/60, "CLOCK", "#00ffff");
      drawCircleGauge(ctx, 500, 90, 70, now.getDate()/31, (now.getMonth()+1)+"/"+now.getDate(), "#ffcc00");
    }

    function drawCircleGauge(ctx, x, y, r, val, label, color) {
      ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = color; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
      ctx.fillText(label, x, y + r + 20);
      let angle = (val * Math.PI * 2) - (Math.PI / 2);
      ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(angle)*(r-10), y + Math.sin(angle)*(r-10));
      ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadPlaylistFromGitHub();
      fetchRSS();
      setInterval(fetchRSS, 900000); // Refresh every 15 mins
    });
  </script>
</body>
</html>
