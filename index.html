<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Monochrome Green Theme */
    body { font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; background-color: #000; color: #0f0; overflow-x: hidden; }
    .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
    
    .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; border-bottom: 2px solid #0f0; }

    .console-rack { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: space-around; 
      align-items: center; 
      background: #050505; 
      padding: 15px; 
      border-radius: 10px; 
      border: 2px solid #0f0; 
      box-shadow: inset 0 0 20px #030;
      margin: 10px 0;
      gap: 10px;
    }

    .gauge-box { flex: 1; min-width: 140px; height: 120px; display: flex; justify-content: center; }
    canvas { width: 100%; height: 100%; }

    .slider-rack { 
      display: flex; 
      gap: 15px; 
      justify-content: center; 
      align-items: flex-end;
      height: 120px;
      padding: 0 10px;
    }
    
    @media (max-width: 600px) {
        .slider-rack { order: 3; width: 100%; margin-top: 10px; }
        .gauge-box { flex: 1; min-width: 45%; }
    }

    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #0f0; font-size: 0.6em; }
    
    input[type=range].vertical {
      writing-mode: bt-lr; 
      appearance: slider-vertical; 
      width: 8px;
      height: 80px;
      accent-color: #0f0;
    }

    .scroll-title { text-align: center; color: #0f0; margin: 0 0 10px 0; font-size: 1.2em; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 5px #0f0; }
    .current-song-wrapper { background: #001100; padding: 10px; border: 1px solid #0f0; margin-bottom: 10px; border-radius: 4px; }
    .current-song-text { display: block; text-align: center; color: #0f0; font-weight: bold; text-shadow: 0 0 8px #0f0; font-size: 0.9em; }
    
    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .controls-bar button { background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 3px; padding: 8px 12px; cursor: pointer; font-size: 0.7em; text-transform: uppercase; font-family: inherit; }
    .controls-bar button:hover { background: #0f0; color: #000; }

    .rss-ticker {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #0f0; 
      white-space: nowrap; overflow: hidden; padding: 10px 0; border-top: 1px solid #0f0; z-index: 1000;
    }
    .ticker-content { display: inline-block; animation: scroll-ticker 60s linear infinite; font-weight: bold; font-size: 0.8em; }
    @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    ol { padding-left: 20px; color: #0f0; margin-top: 10px; font-size: 0.9em; list-style-type: square; }
    li { margin-bottom: 15px; border-bottom: 1px solid #030; padding-bottom: 8px; opacity: 0.6; }
    li.playing { opacity: 1; color: #0f0; border-left: 4px solid #0f0; padding-left: 10px; background: #001100; }
    .track { width: 100%; margin-top: 5px; height: 30px; filter: invert(1) hue-rotate(90deg) brightness(1.5); }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <h2 class="scroll-title">LUCKY MODENA MASTER CONSOLE</h2>
      
      <div class="console-rack">
        <div class="gauge-box"><canvas id="leftGauge"></canvas></div>

        <div class="slider-rack">
          <div class="slider-group"><label>GAIN</label><input id="masterVolume" class="vertical" type="range" min="0" max="1" step="0.05" value="1"></div>
          <div class="slider-group"><label>BASS</label><input id="bassEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
          <div class="slider-group"><label>TREBLE</label><input id="trebleEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
        </div>

        <div class="gauge-box"><canvas id="rightGauge"></canvas></div>
      </div>

      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">SYSTEM_READY</span>
      </div>

      <div class="controls-bar">
        <button id="playBtn">PLAY</button>
        <button id="pauseBtn">PAUSE</button>
        <button id="stopBtn">STOP</button>
        <button id="rrBtn">RR</button>
        <button id="ffBtn">FF</button>
        <button id="prevBtn">PREV</button>
        <button id="nextBtn">NEXT</button>
        <button id="modeBtn">NORMAL</button>
      </div>
    </div>

    <ol id="playlist"><li>Reading library...</li></ol>
  </div>

  <div class="rss-ticker" id="rssTicker"><div class="ticker-content" id="tickerContent">INITIALIZING SYSTEM...</div></div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';
    const RSS_FEEDS = ['https://www.businesstimes.com.sg/rss/singapore'];
    
    // Verified working proxy for raw XML
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const CACHE_KEY = 'rss_cache';

    let tracks = [], items = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'normal', audioCtx, bassNode, trebleNode, analyser, dataArray;
    let LTarget = -Math.PI * 0.75, LCurrent = -Math.PI * 0.75;

    async function init() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        const playlist = document.getElementById('playlist');
        playlist.innerHTML = '';
        files.filter(f => f.name.endsWith('.mp3')).forEach((file) => {
          const cleanName = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ');
          const li = document.createElement('li');
          li.innerHTML = `<span class="song-title">${cleanName}</span><audio controls class="track" crossorigin="anonymous"><source src="${file.download_url}" type="audio/mpeg"></audio>`;
          playlist.appendChild(li);
        });
        setupPlayer();
        loadRSSForceRefresh();
        drawGauges();
      } catch (e) { console.error(e); }
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      tracks.forEach((t, i) => {
        t.addEventListener('play', () => { if (currentlyPlaying !== i) playTrack(i); });
        t.addEventListener('ended', goToNext);
      });
      buildQueue(0);
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      const audio = tracks[idx];
      initAudioContext(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      document.getElementById('currentSongDisplay').textContent = items[idx].querySelector('.song-title').textContent.toUpperCase();
      audio.play();
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(analyser); analyser.connect(audioCtx.destination);
      }
      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode);
        audio.hasConnected = true;
      }
    }

    function drawGauges() {
      const LCanvas = document.getElementById('leftGauge');
      const RCanvas = document.getElementById('rightGauge');
      const LCtx = LCanvas.getContext('2d');
      const RCtx = RCanvas.getContext('2d');

      function render() {
        requestAnimationFrame(render);
        let vol = 0;
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
          vol = sum / dataArray.length;
        }
        LTarget = (-Math.PI * 0.8) + (vol / 128) * (Math.PI * 0.6);
        LCurrent += (LTarget - LCurrent) * 0.15; 
        drawSingle(LCtx, LCanvas, LCurrent, "L-OUTPUT");
        drawSingle(RCtx, RCanvas, LCurrent, "R-OUTPUT");
      }
      render();
    }

    function drawSingle(ctx, canvas, angle, label) {
      const cx = canvas.width / 2;
      const cy = canvas.height * 0.95;
      const rad = canvas.height * 0.85;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.arc(cx, cy, rad, -Math.PI * 0.8, -Math.PI * 0.2);
      ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1.5; ctx.stroke();
      for (let i = 0; i <= 10; i++) {
        const tickAngle = (-Math.PI * 0.8) + (i / 10) * (Math.PI * 0.6);
        const inner = rad - (i % 5 === 0 ? 10 : 5);
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(tickAngle) * rad, cy + Math.sin(tickAngle) * rad);
        ctx.lineTo(cx + Math.cos(tickAngle) * inner, cy + Math.sin(tickAngle) * inner);
        ctx.stroke();
      }
      ctx.fillStyle = "#0f0"; ctx.font = "bold 10px 'Courier New'"; ctx.textAlign = "center";
      ctx.fillText(label, cx, cy - 20); ctx.fillText("VU", cx, cy - 35);
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle + Math.PI/2);
      ctx.beginPath(); ctx.moveTo(-0.5, 0); ctx.lineTo(-1.5, -rad + 10); ctx.lineTo(1.5, -rad + 10); ctx.lineTo(0.5, 0); ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
    }

    // Force clear cache and load fresh from verified proxy
    async function loadRSSForceRefresh() {
      localStorage.removeItem(CACHE_KEY); 
      try {
        const res = await fetch(PROXY + encodeURIComponent(RSS_FEEDS[0]));
        if (res.ok) {
          const text = await res.text();
          const xml = new DOMParser().parseFromString(text, "text/xml");
          const news = Array.from(xml.querySelectorAll("item")).slice(0, 5).map(i => i.querySelector("title").textContent.toUpperCase());
          if (news.length > 0) {
            document.getElementById('tickerContent').textContent = " +++ BT FEED +++ " + news.join("  ///  ");
          }
        }
      } catch(e) { 
        document.getElementById('tickerContent').textContent = "FEED UNAVAILABLE - CHECK CONSOLE"; 
      }
    }

    function goToNext() { 
      queuePos = (queuePos + 1) % queue.length; 
      playTrack(queue[queuePos]); 
    }

    function buildQueue(start) { 
      queue = tracks.map((_, i) => i); 
      if (playMode === 'shuffle') {
        queue.sort(() => Math.random() - 0.5); 
      }
      queuePos = queue.indexOf(start); 
    }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('pauseBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].pause(); };
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; }};
    document.getElementById('ffBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].currentTime += 10; };
    document.getElementById('rrBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].currentTime -= 10; };
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { 
      queuePos = (queuePos - 1 + queue.length) % queue.length; 
      playTrack(queue[queuePos]); 
    };
    
    document.getElementById('modeBtn').onclick = function() { 
      playMode = playMode === 'shuffle' ? 'normal' : 'shuffle'; 
      this.textContent = playMode.toUpperCase(); 
      buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0); 
    };
    
    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
