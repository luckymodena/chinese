<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; background-color: #000; color: #0f0; overflow-x: hidden; }
    .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
    
    .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; }

    .console-rack { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      background: #050505; 
      padding: 15px; 
      border-radius: 10px; 
      border: 2px solid #0f0; 
      box-shadow: inset 0 0 20px #030;
      margin-bottom: 10px;
      gap: 10px;
    }
    
    .baby-box, .gauge-box { 
      width: 100%;
      max-width: 300px;
      height: 140px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      background: #000;
      border: none; 
    }
    #dancing-baby { height: 110px; opacity: 0; transition: opacity 0.3s ease; filter: drop-shadow(0 0 5px #0f0); }
    canvas#mainGauge { width: 100%; height: 100%; }

    .slider-rack {
      display: flex;
      justify-content: center;
      gap: 30px;
      background: #000;
      padding: 15px;
      border: 1px solid #0f0;
      border-bottom: none;
    }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #0f0; font-size: 0.7em; }
    input[type=range].vertical {
      writing-mode: bt-lr; 
      appearance: slider-vertical; 
      width: 12px;
      height: 100px;
      accent-color: #0f0;
    }

    .rss-ticker-inline { width: 100%; background: #001100; color: #0f0; white-space: nowrap; overflow: hidden; padding: 8px 0; border: 1px solid #0f0; border-bottom: none; }
    
    /* Slowed down from 100s to 200s for better readability */
    .ticker-content { 
      display: inline-block; 
      animation: scroll-ticker 200s linear infinite; 
      font-weight: bold; 
      font-size: 0.8em; 
    }
    @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    .current-song-wrapper { background: #001100; padding: 10px; border: 1px solid #0f0; margin-bottom: 10px; border-radius: 0 0 4px 4px; position: relative; }
    .current-song-text { display: block; text-align: center; color: #0f0; font-weight: bold; text-shadow: 0 0 8px #0f0; font-size: 0.9em; cursor: pointer; }
    
    #playlistDropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #000; border: 1px solid #0f0; z-index: 200; max-height: 400px; overflow-y: auto; }
    .dropdown-list { list-style: none; padding: 0; margin: 0; }
    .dropdown-item { padding: 12px; border-bottom: 1px solid #030; cursor: pointer; font-size: 0.8em; }
    .dropdown-item:hover { background: #0f0; color: #000; }
    .dropdown-item.playing { border-left: 5px solid #0f0; background: #002200; color: #0f0; }

    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .controls-bar button { background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 3px; padding: 8px 12px; cursor: pointer; font-size: 0.7em; text-transform: uppercase; font-family: inherit; }
    .controls-bar button:hover { background: #0f0; color: #000; }
    .track { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <div class="console-rack">
        <div class="baby-box"><img id="dancing-baby" src="giphy.gif" alt="Baby"></div>
        <div class="gauge-box"><canvas id="mainGauge"></canvas></div>
      </div>

      <div class="slider-rack">
        <div class="slider-group"><label>GAIN</label><input id="masterVolume" class="vertical" type="range" min="0" max="1" step="0.05" value="1"></div>
        <div class="slider-group"><label>BASS</label><input id="bassEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
        <div class="slider-group"><label>TREBLE</label><input id="trebleEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
      </div>

      <div class="rss-ticker-inline" id="rssTicker"><div class="ticker-content" id="tickerContent">INITIALIZING SYSTEM...</div></div>

      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">SYSTEM_READY ▾</span>
        <div id="playlistDropdown"><ul id="dropdownList" class="dropdown-list"><li class="dropdown-item">LOADING...</li></ul></div>
      </div>

      <div class="controls-bar">
        <button id="playBtn">PLAY</button><button id="pauseBtn">PAUSE</button><button id="stopBtn">STOP</button>
        <button id="prevBtn">PREV</button>
        <button id="rrBtn">RR</button><button id="ffBtn">FF</button>
        <button id="nextBtn">NEXT</button>
        <button id="playbackBtn">NORMAL</button><button id="repeatBtn">REPEAT OFF</button>
      </div>
    </div>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';
    const RSS_URL = 'https://www.businesstimes.com.sg/rss/singapore';
    
    let tracks = [], items = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'normal', repeatMode = 'off', audioCtx, bassNode, trebleNode, analyser, dataArray;
    let targetAngle = -Math.PI * 0.75, currentAngle = -Math.PI * 0.75;

    async function init() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        const dropdownList = document.getElementById('dropdownList');
        dropdownList.innerHTML = '';
        files.filter(f => f.name.endsWith('.mp3')).forEach((file, index) => {
          const audio = document.createElement('audio');
          audio.className = 'track'; audio.crossOrigin = 'anonymous'; audio.src = file.download_url;
          document.body.appendChild(audio);
          const li = document.createElement('li');
          li.className = "dropdown-item"; li.textContent = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ').toUpperCase();
          li.onclick = (e) => { e.stopPropagation(); playTrack(index); document.getElementById('playlistDropdown').style.display = 'none'; };
          dropdownList.appendChild(li);
        });
        setupPlayer(); setupDropdown(); loadRSS(); startVisuals();
      } catch (e) { console.error(e); }
    }

    async function loadRSS() {
      const ticker = document.getElementById('tickerContent');
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`);
        const data = await res.json();
        if (data.status === 'ok') ticker.textContent = " +++ BT FEED (LIVE) +++ " + data.items.map(i => i.title.toUpperCase()).join("  ///  ");
      } catch(e) { ticker.textContent = "FEED UNAVAILABLE"; }
    }

    function setupDropdown() {
      const wrapper = document.getElementById('currentSongDisplay');
      const dropdown = document.getElementById('playlistDropdown');
      wrapper.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block'; };
      document.addEventListener('click', () => dropdown.style.display = 'none');
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('.dropdown-item'));
      tracks = Array.from(document.querySelectorAll('.track'));
      tracks.forEach((t, i) => {
        t.addEventListener('ended', goToNext);
        t.addEventListener('timeupdate', () => { if (currentlyPlaying === i) updateSongTitle(); });
      });
      buildQueue(0);
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx; queuePos = queue.indexOf(idx);
      const audio = tracks[idx]; initAudioContext(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing'); audio.play();
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(analyser); analyser.connect(audioCtx.destination);
      }
      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode); audio.hasConnected = true;
      }
    }

    function startVisuals() {
      const gCanvas = document.getElementById('mainGauge');
      const gCtx = gCanvas.getContext('2d');
      const babyImg = document.getElementById('dancing-baby');

      function render() {
        requestAnimationFrame(render);
        let vol = 0, avgBass = 0;
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0; for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
          vol = sum / dataArray.length;
          let bassSum = 0; for(let i = 0; i < 5; i++) bassSum += dataArray[i];
          avgBass = bassSum / 5;
        }
        
        babyImg.style.opacity = vol > 1 ? "1" : "0";
        babyImg.style.transform = `scale(${1 + (avgBass / 255) * 0.2})`;
        
        targetAngle = (-Math.PI * 0.8) + (vol / 128) * (Math.PI * 0.6);
        currentAngle += (targetAngle - currentAngle) * 0.15; 
        
        const cx = gCanvas.width / 2, cy = gCanvas.height * 0.95, rad = gCanvas.height * 0.85;
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
        gCtx.beginPath(); gCtx.arc(cx, cy, rad, -Math.PI * 0.8, -Math.PI * 0.2);
        gCtx.strokeStyle = '#0f0'; gCtx.lineWidth = 1.5; gCtx.stroke();
        gCtx.fillStyle = "#0f0"; gCtx.save(); gCtx.translate(cx, cy); gCtx.rotate(currentAngle + Math.PI/2);
        gCtx.beginPath(); gCtx.moveTo(-1, 0); gCtx.lineTo(0, -rad + 10); gCtx.lineTo(1, 0); gCtx.fill(); gCtx.restore();
      }
      render();
    }

    function updateSongTitle() {
      const audio = tracks[currentlyPlaying];
      const rem = audio.duration - audio.currentTime;
      const mins = Math.floor(rem / 60), secs = Math.floor(rem % 60);
      document.getElementById('currentSongDisplay').textContent = `${items[currentlyPlaying].textContent} - ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')} ▾`;
    }

    function goToNext() { 
      let nextPos = (queuePos + 1 >= queue.length) ? (repeatMode === 'all' ? 0 : -1) : queuePos + 1;
      if (nextPos !== -1) { queuePos = nextPos; playTrack(queue[queuePos]); }
    }

    function buildQueue(start) { queue = tracks.map((_, i) => i); if (playMode === 'shuffle') queue.sort(() => Math.random() - 0.5); queuePos = queue.indexOf(start); }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('pauseBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].pause(); };
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; }};
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { queuePos = (queuePos - 1 + queue.length) % queue.length; playTrack(queue[queuePos]); };
    document.getElementById('ffBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].currentTime += 10; };
    document.getElementById('rrBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].currentTime -= 10; };
    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
