<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>邱茂鋒Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; background-color: #000; color: #0f0; overflow-x: hidden; }
    .container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }
    
    .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; border-bottom: 2px solid #444; }

    /* Analog Gauge Style */
    .gauge-container { 
      display: flex; justify-content: center; margin: 10px 0; 
      background: #1a1a1a; padding: 15px; border-radius: 10px; 
      border: 4px solid #333; box-shadow: inset 0 0 20px #000;
      height: 180px; 
    }
    canvas { width: 100%; max-width: 400px; height: 100%; }

    .scroll-title { text-align: center; color: #aaa; margin: 0 0 10px 0; font-size: 1.4em; letter-spacing: 3px; font-weight: bold; }
    .current-song-wrapper { background: #0a0a0a; padding: 12px; border: 1px solid #333; margin-bottom: 10px; border-radius: 4px; }
    .current-song-text { display: block; text-align: center; color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffcc00; }
    
    .controls-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .controls-bar button { background: linear-gradient(#444, #222); color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 10px 16px; cursor: pointer; font-size: 0.8em; }
    .controls-bar button:active { background: #111; color: #0f0; }
    
    .audio-enhancements { display: flex; flex-wrap: wrap; gap: 20px; border: 1px solid #333; padding: 15px; border-radius: 4px; justify-content: center; background: #111; }
    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #888; font-size: 0.7em; }
    input[type=range] { writing-mode: bt-lr; accent-color: #ffcc00; width: 100px; }

    /* RSS Ticker */
    .rss-ticker {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #050505; color: #ffcc00; 
      white-space: nowrap; overflow: hidden; padding: 12px 0; border-top: 1px solid #444; z-index: 1000;
    }
    .ticker-content { display: inline-block; animation: scroll-ticker 150s linear infinite; font-weight: bold; }
    @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    ol { padding-left: 30px; color: #0f0; margin-top: 20px; }
    li { margin-bottom: 20px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; opacity: 0.7; }
    li.playing { opacity: 1; color: #fff; border-left: 4px solid #ffcc00; padding-left: 10px; background: #111; }
    .song-title { font-size: 1em; display: block; margin-bottom: 8px; }
    audio { width: 100%; height: 35px; filter: invert(100%) hue-rotate(180deg); }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <h2 class="scroll-title">STEPHEN KHOO MASTER CONSOLE</h2>
      
      <div class="gauge-container">
        <canvas id="analogGauge"></canvas>
      </div>

      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">READY_</span>
      </div>

      <div class="controls-bar">
        <button id="playBtn">POWER/PLAY</button>
        <button id="stopBtn">STOP</button>
        <button id="prevBtn">BACK</button>
        <button id="nextBtn">SKIP</button>
        <button id="modeBtn">SHUFFLE: ON</button>
      </div>

      <div class="audio-enhancements">
        <div class="slider-group"><label>GAIN</label> <input id="masterVolume" type="range" min="0" max="1" step="0.05" value="1"></div>
        <div class="slider-group"><label>BASS</label> <input id="bassEq" type="range" min="-12" max="12" step="1" value="0"></div>
        <div class="slider-group"><label>TREBLE</label> <input id="trebleEq" type="range" min="-12" max="12" step="1" value="0"></div>
      </div>
    </div>

    <ol id="playlist"><li>Reading library...</li></ol>
  </div>

  <div class="rss-ticker" id="rssTicker"><div class="ticker-content" id="tickerContent">SYNCING BUSINESS TIMES...</div></div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';
    const RSS_FEEDS = [
      'https://www.businesstimes.com.sg/rss/singapore',
      'https://www.businesstimes.com.sg/rss/economy-policy',
      'https://www.businesstimes.com.sg/rss/companies-markets',
      'https://www.businesstimes.com.sg/rss/banking-finance',
      'https://www.businesstimes.com.sg/rss/telcos-media-tech',
      'https://www.businesstimes.com.sg/rss/capital-markets-currencies',
      'https://www.businesstimes.com.sg/rss/wealth',
      'https://www.businesstimes.com.sg/rss/working-life'
    ];
    const PROXY = 'https://api.allorigins.win/raw?url=';

    let tracks = [], items = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'shuffle', audioCtx, bassNode, trebleNode, analyser, dataArray;
    let targetAngle = -Math.PI * 0.75, currentAngle = -Math.PI * 0.75;

    async function init() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        const playlist = document.getElementById('playlist');
        playlist.innerHTML = '';
        files.filter(f => f.name.endsWith('.mp3')).forEach((file) => {
          const cleanName = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ');
          const li = document.createElement('li');
          li.innerHTML = `<span class="song-title">${cleanName}</span><audio controls class="track" crossorigin="anonymous"><source src="${file.download_url}" type="audio/mpeg"></audio>`;
          playlist.appendChild(li);
        });
        setupPlayer();
        loadRSS();
        drawGauge(); // Start the drawing loop immediately
      } catch (e) { console.error(e); }
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      tracks.forEach((t, i) => {
        t.addEventListener('play', () => { if (currentlyPlaying !== i) playTrack(i); });
        t.addEventListener('ended', goToNext);
      });
      buildQueue(0);
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      const audio = tracks[idx];
      initAudioContext(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      document.getElementById('currentSongDisplay').textContent = items[idx].querySelector('.song-title').textContent.toUpperCase();
      audio.play();
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.8;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(analyser); analyser.connect(audioCtx.destination);
      }
      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode);
        audio.hasConnected = true;
      }
    }

    function drawGauge() {
      const canvas = document.getElementById('analogGauge');
      const ctx = canvas.getContext('2d');
      const centerX = canvas.width / 2;
      const centerY = canvas.height * 0.9;
      const radius = canvas.height * 0.8;

      function render() {
        requestAnimationFrame(render);
        
        // Calculate audio level (RMS)
        let volume = 0;
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
          volume = sum / dataArray.length;
        }

        // Map volume to angle: -135deg to -45deg
        targetAngle = (-Math.PI * 0.75) + (volume / 128) * (Math.PI * 0.5);
        currentAngle += (targetAngle - currentAngle) * 0.15; // Smooth needle movement

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Scale Background
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, -Math.PI * 0.8, -Math.PI * 0.2);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 15; ctx.stroke();

        // Draw Red Zone (Peak)
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, -Math.PI * 0.35, -Math.PI * 0.2);
        ctx.strokeStyle = '#900'; ctx.lineWidth = 15; ctx.stroke();

        // Draw Scale Ticks
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
        for (let a = -0.8; a <= -0.2; a += 0.05) {
          const x1 = centerX + Math.cos(a * Math.PI) * (radius - 10);
          const y1 = centerY + Math.sin(a * Math.PI) * (radius - 10);
          const x2 = centerX + Math.cos(a * Math.PI) * (radius + 10);
          const y2 = centerY + Math.sin(a * Math.PI) * (radius + 10);
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        // Draw "VU" Label
        ctx.fillStyle = "#666"; ctx.font = "bold 14px Arial"; ctx.fillText("VU METER", centerX - 30, centerY - 40);

        // Draw Needle
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(currentAngle + Math.PI/2);
        ctx.beginPath();
        ctx.moveTo(-2, 0); ctx.lineTo(0, -radius + 15); ctx.lineTo(2, 0);
        ctx.fillStyle = '#f00'; ctx.fill();
        ctx.restore();

        // Needle Center Cap
        ctx.beginPath(); ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#333'; ctx.fill();
      }
      render();
    }

    async function loadRSS() {
      let headlines = [];
      for (let url of RSS_FEEDS) {
        try {
          const res = await fetch(PROXY + encodeURIComponent(url));
          const text = await res.text();
          const xml = new DOMParser().parseFromString(text, "text/xml");
          Array.from(xml.querySelectorAll("item")).slice(0, 4).forEach(i => headlines.push(i.querySelector("title").textContent.toUpperCase()));
        } catch(e) {}
      }
      document.getElementById('tickerContent').textContent = " +++ BUSINESS TIMES SINGAPORE +++ " + headlines.join("  ///  ");
    }

    function goToNext() { queuePos = (queuePos + 1) % queue.length; playTrack(queue[queuePos]); }
    function buildQueue(start) { queue = tracks.map((_, i) => i); if (playMode === 'shuffle') queue.sort(() => Math.random() - 0.5); queuePos = queue.indexOf(start); }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; }};
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { queuePos = (queuePos - 1 + queue.length) % queue.length; playTrack(queue[queuePos]); };
    document.getElementById('modeBtn').onclick = function() { playMode = playMode === 'shuffle' ? 'normal' : 'shuffle'; this.textContent = "SHUFFLE: " + (playMode === 'shuffle' ? 'ON' : 'OFF'); buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0); };
    
    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
