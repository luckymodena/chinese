<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>邱茂鋒Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #000000; color: #00ff00; }
    .container { max-width: 900px; margin: 0 auto; position: relative; }
    .sticky-header { position: -webkit-sticky; position: sticky; top: 0; z-index: 100; background-color: #000000; padding: 6px 4px; border-bottom: 1px solid #333; }
    .scroll-wrapper { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 4px; }
    .scroll-title { display: block; font-size: 1.5em; font-weight: bold; text-align: center; margin: 0 auto; }
    .current-song-wrapper { width: 100%; overflow: hidden; white-space: nowrap; font-size: 1.2em; margin-bottom: 10px; }
    .current-song-text { display: block; text-align: center; color: #00ffff; }
    
    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
    .controls-group { display: flex; gap: 4px; }
    audio { width: 100%; margin-top: 4px; accent-color: #00ff00; }
    .controls-bar button { background-color: #333; color: #00ff00; border: 1px solid #00ff00; border-radius: 4px; padding: 6px 12px; cursor: pointer; }
    .audio-enhancements { display: flex; flex-wrap: wrap; gap: 12px; border: 1px solid #00ff00; padding: 10px; border-radius: 4px; margin: 10px 0; justify-content: center; }
    .search-wrapper { margin: 10px 0; }
    .search-input { width: 100%; box-sizing: border-box; background: #111; border: 1px solid #00ff00; color: #00ff00; padding: 10px; border-radius: 4px; }
    
    ol { padding-left: 20px; list-style-position: inside; }
    li { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .song-title { font-size: 1.1em; display: block; margin-bottom: 5px; color: #00ff00; }
    ol li.playing { border: 2px solid #ffffff; border-radius: 6px; padding: 10px; background-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 10px #ffffff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <div class="scroll-wrapper"><h2 class="scroll-title">Stephen Khoo 邱茂鋒 Playlist</h2></div>
      <div class="current-song-wrapper"><span id="currentSongScrolling" class="current-song-text">Now Playing: (loading...)</span></div>

      <div class="controls-bar">
        <div class="controls-group">
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
          <button id="prevBtn">Prev</button>
          <button id="nextBtn">Next</button>
        </div>
        <button id="modeBtn">Mode: Shuffle</button>
      </div>

      <div class="audio-enhancements">
        <div class="slider-group"><label>Vol:</label> <input id="masterVolume" type="range" min="0" max="1" step="0.05" value="1"></div>
        <div class="slider-group"><label>Bass:</label> <input id="bassEq" type="range" min="-12" max="12" step="1" value="0"></div>
        <div class="slider-group"><label>Treble:</label> <input id="trebleEq" type="range" min="-12" max="12" step="1" value="0"></div>
      </div>

      <div class="search-wrapper">
        <input type="text" id="songSearch" class="search-input" placeholder="Search playlist...">
      </div>
    </div>

    <ol id="playlist">
      <li>Loading songs from GitHub...</li>
    </ol>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';

    let items = [], tracks = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'shuffle', audioCtx, bassNode, trebleNode;

    async function loadPlaylist() {
      const playlistElement = document.getElementById('playlist');
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        playlistElement.innerHTML = '';
        files.filter(f => f.name.endsWith('.mp3')).forEach((file, idx) => {
          const name = decodeURIComponent(file.name).replace('.mp3', '').replace(/-/g, ' ');
          const li = document.createElement('li');
          li.innerHTML = `<span class="song-title">${idx + 1}. ${name}</span><audio controls class="track"><source src="${file.download_url}" type="audio/mpeg"></audio>`;
          playlistElement.appendChild(li);
        });
        refreshTracks();
        buildQueue(0);
        document.getElementById('currentSongScrolling').textContent = "Ready to Play";
      } catch (e) {
        playlistElement.innerHTML = "<li>Error loading songs. Check your repo structure.</li>";
      }
    }

    function refreshTracks() {
      items = Array.from(document.querySelectorAll('#playlist li'));
      tracks = Array.from(document.querySelectorAll('#playlist .track'));
      tracks.forEach((t, i) => {
        t.addEventListener('play', () => { if (currentlyPlaying !== i) playTrack(i); });
        t.addEventListener('ended', goToNext);
      });
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      const audio = tracks[idx];
      setupEQ(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      document.getElementById('currentSongScrolling').textContent = "Now Playing: " + items[idx].querySelector('.song-title').textContent;
      audio.play();
    }

    function goToNext() {
      queuePos = (queuePos + 1) % queue.length;
      playTrack(queue[queuePos]);
    }

    function buildQueue(start) {
      queue = tracks.map((_, i) => i);
      if (playMode === 'shuffle') queue.sort(() => Math.random() - 0.5);
      queuePos = queue.indexOf(start);
    }

    function setupEQ(audio) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(audioCtx.destination);
      }
      if (!audio.connected) {
        audioCtx.createMediaElementSource(audio).connect(bassNode);
        audio.connected = true;
      }
    }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; } };
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { queuePos = (queuePos - 1 + queue.length) % queue.length; playTrack(queue[queuePos]); };
    document.getElementById('modeBtn').onclick = function() {
      playMode = playMode === 'shuffle' ? 'normal' : 'shuffle';
      this.textContent = "Mode: " + (playMode.charAt(0).toUpperCase() + playMode.slice(1));
      buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0);
    };
    document.getElementById('songSearch').oninput = (e) => {
      const val = e.target.value.toLowerCase();
      items.forEach(li => li.style.display = li.textContent.toLowerCase().includes(val) ? '' : 'none');
    };

    window.onload = loadPlaylist;
  </script>
</body>
</html>
