<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stephen Khoo Playlist</title>
  <link rel="icon" href="mp3/faviconico.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Global Monochrome Green Theme */
    body { font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; background-color: #000; color: #0f0; overflow-x: hidden; }
    .container { max-width: 1000px; margin: 0 auto; padding-bottom: 80px; }
    
    /* Removed border-bottom to delete the green line */
    .sticky-header { position: sticky; top: 0; z-index: 100; background: #000; padding: 10px 0; }

    .console-rack { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: space-around; 
      align-items: center; 
      background: #050505; 
      padding: 15px; 
      border-radius: 10px; 
      border: 2px solid #0f0; 
      box-shadow: inset 0 0 20px #030;
      margin: 10px 0;
      gap: 10px;
    }

    .baby-box { 
      flex: 1; 
      min-width: 140px; 
      height: 120px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      overflow: hidden;
      border: 1px inset #0f0;
      background: #000;
    }
    #dancing-baby { 
      height: 100px; 
      transform: scale(1); 
      opacity: 0; 
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 0 5px #0f0); 
    }

    .gauge-box { flex: 1; min-width: 140px; height: 120px; display: flex; justify-content: center; }
    canvas { width: 100%; height: 100%; }

    .slider-rack { 
      display: flex; 
      gap: 15px; 
      justify-content: center; 
      align-items: flex-end;
      height: 120px;
      padding: 0 10px;
    }
    
    @media (max-width: 600px) {
        .slider-rack { order: 3; width: 100%; margin-top: 10px; }
        .baby-box { order: 1; width: 45%; }
        .gauge-box { order: 2; width: 45%; }
    }

    .slider-group { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #0f0; font-size: 0.6em; }
    
    input[type=range].vertical {
      writing-mode: bt-lr; 
      appearance: slider-vertical; 
      width: 8px;
      height: 80px;
      accent-color: #0f0;
    }

    /* Relocated RSS Ticker styling */
    .rss-ticker-inline {
      width: 100%;
      background: #001100;
      color: #0f0;
      white-space: nowrap;
      overflow: hidden;
      padding: 8px 0;
      margin-top: 10px;
      border: 1px solid #0f0;
      border-bottom: none; /* Merges with the song wrapper below */
      border-radius: 4px 4px 0 0;
    }

    .ticker-content { display: inline-block; animation: scroll-ticker 60s linear infinite; font-weight: bold; font-size: 0.8em; }
    @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* Dropdown Styles - removed top border to merge with ticker */
    .current-song-wrapper { 
      background: #001100; 
      padding: 10px; 
      border: 1px solid #0f0; 
      margin-bottom: 10px; 
      border-radius: 0 0 4px 4px; 
      position: relative; 
    }
    .current-song-text { 
      display: block; 
      text-align: center; 
      color: #0f0; 
      font-weight: bold; 
      text-shadow: 0 0 8px #0f0; 
      font-size: 0.9em; 
      cursor: pointer;
    }
    #playlistDropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: #000;
      border: 1px solid #0f0;
      z-index: 200;
      max-height: 400px;
      overflow-y: auto;
      box-shadow: 0 10px 20px #000;
    }
    .dropdown-list { list-style: none; padding: 0; margin: 0; }
    .dropdown-item {
      padding: 12px;
      border-bottom: 1px solid #030;
      cursor: pointer;
      font-size: 0.8em;
      transition: background 0.2s;
    }
    .dropdown-item:hover { background: #0f0; color: #000; }
    .dropdown-item.playing { border-left: 5px solid #0f0; background: #002200; color: #0f0; }

    .controls-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .controls-bar button { background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 3px; padding: 8px 12px; cursor: pointer; font-size: 0.7em; text-transform: uppercase; font-family: inherit; }
    .controls-bar button:hover { background: #0f0; color: #000; }

    .track { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sticky-header">
      <div class="console-rack">
        <div class="baby-box">
          <img id="dancing-baby" src="giphy.gif" alt="Baby">
        </div>

        <div class="slider-rack">
          <div class="slider-group"><label>GAIN</label><input id="masterVolume" class="vertical" type="range" min="0" max="1" step="0.05" value="1"></div>
          <div class="slider-group"><label>BASS</label><input id="bassEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
          <div class="slider-group"><label>TREBLE</label><input id="trebleEq" class="vertical" type="range" min="-12" max="12" step="1" value="0"></div>
        </div>

        <div class="gauge-box"><canvas id="mainGauge"></canvas></div>
      </div>

      <div class="rss-ticker-inline" id="rssTicker">
        <div class="ticker-content" id="tickerContent">INITIALIZING SYSTEM...</div>
      </div>

      <div class="current-song-wrapper">
        <span id="currentSongDisplay" class="current-song-text">SYSTEM_READY ▾</span>
        <div id="playlistDropdown">
          <ul id="dropdownList" class="dropdown-list">
            <li class="dropdown-item">LOADING LIBRARY...</li>
          </ul>
        </div>
      </div>

      <div class="controls-bar">
        <button id="playBtn">PLAY</button>
        <button id="pauseBtn">PAUSE</button>
        <button id="stopBtn">STOP</button>
        <button id="rrBtn">RR</button>
        <button id="ffBtn">FF</button>
        <button id="prevBtn">PREV</button>
        <button id="nextBtn">NEXT</button>
        <button id="playbackBtn">NORMAL</button>
        <button id="repeatBtn">REPEAT OFF</button>
      </div>
    </div>
  </div>

  <script>
    const GITHUB_USERNAME = 'luckymodena'; 
    const REPO_NAME = 'chinese';      
    const FOLDER_PATH = 'mp3';
    // Using the rss2json method
    const RSS_URL = 'https://www.businesstimes.com.sg/rss/singapore';
    
    let tracks = [], items = [], currentlyPlaying = -1, queue = [], queuePos = -1;
    let playMode = 'normal', repeatMode = 'off', audioCtx, bassNode, trebleNode, analyser, dataArray;
    let targetAngle = -Math.PI * 0.75, currentAngle = -Math.PI * 0.75;

    async function init() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
        const files = await response.json();
        
        const dropdownList = document.getElementById('dropdownList');
        dropdownList.innerHTML = '';
        
        files.filter(f => f.name.endsWith('.mp3')).forEach((file, index) => {
          const cleanName = decodeURIComponent(file.name).replace('.mp3', '').replace(/[-_]/g, ' ');
          
          const audio = document.createElement('audio');
          audio.className = 'track';
          audio.crossOrigin = 'anonymous';
          audio.src = file.download_url;
          document.body.appendChild(audio);
          
          const li = document.createElement('li');
          li.className = "dropdown-item";
          li.textContent = cleanName.toUpperCase();
          li.onclick = (e) => {
            e.stopPropagation();
            playTrack(index);
            document.getElementById('playlistDropdown').style.display = 'none';
          };
          dropdownList.appendChild(li);
        });

        setupPlayer();
        setupDropdown();
        loadRSS(); // Updated RSS call
        drawGauges();
      } catch (e) { console.error(e); }
    }

    // Updated RSS logic using rss2json
    async function loadRSS() {
      const ticker = document.getElementById('tickerContent');
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/65f432101f5677401f3e7215`, {
           // Note: You can replace this with your own rss2json endpoint or direct fetch
        });
        // Simplified for reliability using the requested rss2json format
        const apiRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`);
        const data = await apiRes.json();
        
        if (data.status === 'ok') {
          const news = data.items.map(i => i.title.toUpperCase());
          ticker.textContent = " +++ BT FEED (LIVE) +++ " + news.join("  ///  ");
        } else {
          ticker.textContent = "FEED ERROR: SERVICE UNAVAILABLE";
        }
      } catch(e) { 
        ticker.textContent = "FEED UNAVAILABLE"; 
      }
    }

    function setupDropdown() {
      const wrapper = document.getElementById('currentSongDisplay');
      const dropdown = document.getElementById('playlistDropdown');
      wrapper.onclick = (e) => {
        e.stopPropagation();
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      };
      document.addEventListener('click', () => dropdown.style.display = 'none');
    }

    function setupPlayer() {
      items = Array.from(document.querySelectorAll('.dropdown-item'));
      tracks = Array.from(document.querySelectorAll('.track'));
      tracks.forEach((t, i) => {
        t.addEventListener('ended', goToNext);
        t.addEventListener('timeupdate', () => { if (currentlyPlaying === i) updateSongTitle(); });
      });
      buildQueue(0);
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateSongTitle() {
      if (currentlyPlaying === -1) return;
      const audio = tracks[currentlyPlaying];
      const remaining = audio.duration - audio.currentTime;
      const title = items[currentlyPlaying].textContent.toUpperCase();
      document.getElementById('currentSongDisplay').textContent = `${title} - ${formatTime(remaining)} ▾`;
    }

    function playTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      tracks.forEach((t, i) => { t.pause(); items[i].classList.remove('playing'); });
      currentlyPlaying = idx;
      queuePos = queue.indexOf(idx);
      const audio = tracks[idx];
      initAudioContext(audio);
      audio.volume = document.getElementById('masterVolume').value;
      items[idx].classList.add('playing');
      updateSongTitle();
      audio.play();
    }

    function initAudioContext(audio) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!bassNode) {
        bassNode = audioCtx.createBiquadFilter(); bassNode.type = 'lowshelf'; bassNode.frequency.value = 200;
        trebleNode = audioCtx.createBiquadFilter(); trebleNode.type = 'highshelf'; trebleNode.frequency.value = 3000;
        bassNode.connect(trebleNode); trebleNode.connect(analyser); analyser.connect(audioCtx.destination);
      }
      if (!audio.hasConnected) {
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(bassNode);
        audio.hasConnected = true;
      }
    }

    function drawGauges() {
      const canvas = document.getElementById('mainGauge');
      const ctx = canvas.getContext('2d');
      const babyImg = document.getElementById('dancing-baby');

      function render() {
        requestAnimationFrame(render);
        let vol = 0, avgBass = 0;
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          let sum = 0;
          for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
          vol = sum / dataArray.length;
          let bassSum = 0;
          for(let i = 0; i < 5; i++) bassSum += dataArray[i];
          avgBass = bassSum / 5;
        }
        if (vol > 1) {
          babyImg.style.opacity = "1";
          babyImg.style.transform = `scale(${1 + (avgBass / 255) * 0.6})`;
        } else {
          babyImg.style.opacity = "0";
        }
        targetAngle = (-Math.PI * 0.8) + (vol / 128) * (Math.PI * 0.6);
        currentAngle += (targetAngle - currentAngle) * 0.15; 
        drawSingle(ctx, canvas, currentAngle, "OUTPUT-VU");
      }
      render();
    }

    function drawSingle(ctx, canvas, angle, label) {
      const cx = canvas.width / 2, cy = canvas.height * 0.95, rad = canvas.height * 0.85;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath(); ctx.arc(cx, cy, rad, -Math.PI * 0.8, -Math.PI * 0.2);
      ctx.strokeStyle = '#0f0'; ctx.lineWidth = 1.5; ctx.stroke();
      for (let i = 0; i <= 10; i++) {
        const tickAngle = (-Math.PI * 0.8) + (i / 10) * (Math.PI * 0.6);
        const inner = rad - (i % 5 === 0 ? 10 : 5);
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(tickAngle) * rad, cy + Math.sin(tickAngle) * rad);
        ctx.lineTo(cx + Math.cos(tickAngle) * inner, cy + Math.sin(tickAngle) * inner);
        ctx.stroke();
      }
      ctx.fillStyle = "#0f0"; ctx.font = "bold 10px 'Courier New'"; ctx.textAlign = "center";
      ctx.fillText(label, cx, cy - 20); ctx.fillText("dB", cx, cy - 35);
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle + Math.PI/2);
      ctx.beginPath(); ctx.moveTo(-0.5, 0); ctx.lineTo(-1.5, -rad + 10); ctx.lineTo(1.5, -rad + 10); ctx.lineTo(0.5, 0); ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
    }

    function goToNext() { 
      if (repeatMode === 'one' && currentlyPlaying !== -1) { playTrack(currentlyPlaying); return; }
      let nextPos = queuePos + 1;
      if (nextPos >= queue.length) {
        if (repeatMode === 'all') nextPos = 0; 
        else { if (currentlyPlaying !== -1) tracks[currentlyPlaying].pause(); return; }
      }
      queuePos = nextPos; playTrack(queue[queuePos]); 
    }

    function buildQueue(start) { 
      queue = tracks.map((_, i) => i); 
      if (playMode === 'shuffle') {
        for (let i = queue.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [queue[i], queue[j]] = [queue[j], queue[i]];
        }
      }
      queuePos = queue.indexOf(start); 
    }

    document.getElementById('playBtn').onclick = () => currentlyPlaying === -1 ? playTrack(queue[0]) : tracks[currentlyPlaying].play();
    document.getElementById('pauseBtn').onclick = () => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].pause(); };
    document.getElementById('stopBtn').onclick = () => { if(currentlyPlaying !== -1) { tracks[currentlyPlaying].pause(); tracks[currentlyPlaying].currentTime = 0; document.getElementById('currentSongDisplay').textContent = "SYSTEM_READY ▾"; }};
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('prevBtn').onclick = () => { queuePos = (queuePos - 1 + queue.length) % queue.length; playTrack(queue[queuePos]); };
    document.getElementById('playbackBtn').onclick = function() {
      playMode = playMode === 'normal' ? 'shuffle' : 'normal';
      this.textContent = playMode.toUpperCase();
      buildQueue(currentlyPlaying !== -1 ? currentlyPlaying : 0);
    };
    document.getElementById('repeatBtn').onclick = function() {
      if (repeatMode === 'off') { repeatMode = 'one'; this.textContent = 'REPEAT ONE'; }
      else if (repeatMode === 'one') { repeatMode = 'all'; this.textContent = 'REPEAT ALL'; }
      else { repeatMode = 'off'; this.textContent = 'REPEAT OFF'; }
    };
    document.getElementById('bassEq').oninput = (e) => { if(bassNode) bassNode.gain.value = e.target.value; };
    document.getElementById('trebleEq').oninput = (e) => { if(trebleNode) trebleNode.gain.value = e.target.value; };
    document.getElementById('masterVolume').oninput = (e) => { if(currentlyPlaying !== -1) tracks[currentlyPlaying].volume = e.target.value; };

    window.onload = init;
  </script>
</body>
</html>
